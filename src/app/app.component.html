<main class="app-shell">
  <section class="hero">
    <app-course-tabs [activeTab]="activeTab" (tabChange)="onTabChange($event)"></app-course-tabs>
  </section>

  <section class="content">
    <app-angular-outline *ngIf="activeTab === 'angular'"></app-angular-outline>
    <app-spring-outline *ngIf="activeTab === 'spring'"></app-spring-outline>
  </section>
</main>
